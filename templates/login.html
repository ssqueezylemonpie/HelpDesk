{% extends 'base.html' %}

{% block content %}
<section class="page-header" style="text-align: center;">
    <h1>Welcome Back</h1>
    <p>Please log in to your account.</p>
</section>

<div class="form-card" style="max-width: 450px; margin: 0 auto 4rem;">
    <form action="/login" method="POST">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1.5rem; justify-content: center;">Log In</button>
        
        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted); font-size: 0.9rem;">
            Don't have an account yet? <a href="/register" style="color: var(--accent); text-decoration: none; font-weight: 600;">Sign up</a>
        </p>
    </form>
</div>
{% endblock %}
