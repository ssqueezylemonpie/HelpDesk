{% extends 'base.html' %}

{% block content %}
<section class="page-header">
    <h1>Submit a New Ticket</h1>
    <p>Fill in the form below and our team will get back to you as soon as possible.</p>
</section>

<div class="form-card">
    <form action="/ticket/new" method="POST" id="create-ticket-form">
        <div class="form-group">
            <label for="title">Ticket Title</label>
            <input type="text" id="title" name="title" placeholder="Short description of the issue" required>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="priority">Priority</label>
                <select id="priority" name="priority" required>
                    <option value="" disabled selected>Select priority...</option>
                    <option value="low">&#128994; Low</option>
                    <option value="medium">&#128993; Medium</option>
                    <option value="high">&#128308; High</option>
                </select>
            </div>
            <div class="form-group">
                <label for="category">Category</label>
                <select id="category" name="category">
                    <option value="" disabled selected>Select category...</option>
                    <option value="hardware">Hardware</option>
                    <option value="software">Software</option>
                    <option value="network">Network</option>
                    <option value="account">Account / Login</option>
                    <option value="other">Other</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="6" placeholder="Describe the problem in detail..." required></textarea>
        </div>

        <div class="form-group">
            <label for="name">Your Name</label>
            <input type="text" id="name" name="name" placeholder="Full name" required>
        </div>

        <div class="form-group">
            <label for="email">Your Email</label>
            <input type="email" id="email" name="email" placeholder="you@school.no" required>
        </div>

        <div class="form-actions">
            <a href="/" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary" id="submit-btn">Submit Ticket</button>
        </div>
    </form>
</div>
{% endblock %}
